name: Release Automation

on:
  push:
    tags:
      - 'release/**'
    branches:
      - 'release/**'
  create:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: read

jobs:
  draft-release:
    name: Create draft release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag information
        id: tag_info
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF#refs/tags/}"
          TAG_COMMIT="$(git rev-list -n 1 "$TAG_NAME")"
          TAG_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG_NAME}"

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "tag_commit=$TAG_COMMIT" >> "$GITHUB_OUTPUT"
          echo "tag_url=$TAG_URL" >> "$GITHUB_OUTPUT"

          if [[ "$TAG_NAME" =~ ^release/([^/]+)/([0-9]+)\. ]]; then
            COMPONENT="${BASH_REMATCH[1]}"
            MAJOR="${BASH_REMATCH[2]}"
            PREVIOUS_TAG_PATTERN="release/${COMPONENT}/${MAJOR}."
          else
            COMPONENT="unknown"
            MAJOR="unknown"
            PREVIOUS_TAG_PATTERN=""
          fi

          echo "component=$COMPONENT" >> "$GITHUB_OUTPUT"
          echo "major_version=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "previous_tag_pattern=$PREVIOUS_TAG_PATTERN" >> "$GITHUB_OUTPUT"

          BRANCH="$(
            git for-each-ref --format='%(refname:short)' refs/remotes/origin/release/ |
            while read -r ref; do
              if git merge-base --is-ancestor "$TAG_COMMIT" "$ref"; then
                echo "${ref#origin/}"
                break
              fi
            done
          )"

          BRANCH="${BRANCH:-unknown}"
          if [[ "$BRANCH" != "unknown" ]]; then
            BRANCH_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/tree/${BRANCH}"
          else
            BRANCH_URL=""
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "branch_url=$BRANCH_URL" >> "$GITHUB_OUTPUT"

      - name: Resolve actor info
        id: actor_info
        uses: actions/github-script@v7
        env:
          LOGIN: ${{ github.actor }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const login = process.env.LOGIN;
            let email = '';
            let url = `${context.serverUrl}/${login}`;

            try {
              const { data } = await github.rest.users.getByUsername({ username: login });
              url = data.html_url || url;
              email = data.email || '';
            } catch (_) {}

            core.setOutput('login', login);
            core.setOutput('url', url);
            core.setOutput('email', email);

      - name: Check whether tag is annotated
        id: tag_kind
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${{ steps.tag_info.outputs.tag_name }}"

          # `^{tag}` resolves only if the ref points to a tag object (annotated/signed tag).
          if git rev-parse --verify --quiet "refs/tags/${TAG_NAME}^{tag}" >/dev/null; then
            echo "is_annotated=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_annotated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Find previous release tag
        id: previous_tag
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${{ steps.tag_info.outputs.tag_name }}"
          PATTERN="${{ steps.tag_info.outputs.previous_tag_pattern }}"
          BRANCH="${{ steps.tag_info.outputs.branch }}"

          if [[ -z "$PATTERN" ]]; then
            echo "previous_tag=" >> "$GITHUB_OUTPUT"
            echo "previous_tag_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$BRANCH" != "unknown" ]]; then
            PREV_TAG="$(
              git tag --merged "$BRANCH" --sort=-version:refname |
              grep -E "^${PATTERN}" |
              grep -Fxv "$TAG_NAME" |
              head -n1 || true
            )"
          else
            PREV_TAG="$(
              git tag --sort=-version:refname |
              grep -E "^${PATTERN}" |
              grep -Fxv "$TAG_NAME" |
              head -n1 || true
            )"
          fi

          PREV_TAG_URL=""
          if [[ -n "$PREV_TAG" ]]; then
            PREV_TAG_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${PREV_TAG}"
          fi

          echo "previous_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "previous_tag_url=$PREV_TAG_URL" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${{ steps.tag_info.outputs.tag_name }}"
          PREV_TAG="${{ steps.previous_tag.outputs.previous_tag }}"
          IS_ANNOTATED="${{ steps.tag_kind.outputs.is_annotated }}"

          NOTES_FILE="$(mktemp)"

          {
            echo "<!--"
            echo "  Notes:"
            echo "  - Fill in the release summary before publishing."
            echo "  - Add PR references, issue links, or commit highlights as needed."
            if [[ "$IS_ANNOTATED" != "true" ]]; then
              echo
              echo "  WARNING: this tag is lightweight, not annotated."
              echo "  Recommended:"
              echo "    git tag -a <tag> -m \"Release <tag>\""
            fi
            echo "-->"
            echo
            echo "## What's Changed"
            echo "-"
            if [[ -n "$PREV_TAG" ]]; then
              echo
              echo "## Compare"
              echo "- Previous tag: \`$PREV_TAG\`"
              echo "- Current tag: \`$TAG_NAME\`"
            fi
          } > "$NOTES_FILE"

          {
            echo 'notes<<EOF'
            cat "$NOTES_FILE"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create_release
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.tag_info.outputs.tag_name }}
          BRANCH: ${{ steps.tag_info.outputs.branch }}
          RELEASE_NOTES: ${{ steps.release_notes.outputs.notes }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tagName = process.env.TAG_NAME;
            const branch = process.env.BRANCH;
            const body = process.env.RELEASE_NOTES;

            try {
              const response = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tagName,
                name: tagName,
                body,
                draft: true,
                prerelease: false,
                target_commitish: branch !== 'unknown' ? branch : undefined
              });

              core.setOutput('success', 'true');
              core.setOutput('release_id', String(response.data.id));
              core.setOutput('release_url', response.data.html_url);
            } catch (error) {
              core.setOutput('success', 'false');
              core.setOutput('error', error.message);
              throw error;
            }

      - name: Build Slack payload for draft release
        id: slack_draft_payload
        shell: bash
        env:
          TAG_NAME: ${{ steps.tag_info.outputs.tag_name }}
          TAG_URL: ${{ steps.tag_info.outputs.tag_url }}
          BRANCH: ${{ steps.tag_info.outputs.branch }}
          BRANCH_URL: ${{ steps.tag_info.outputs.branch_url }}
          COMPONENT: ${{ steps.tag_info.outputs.component }}
          PREVIOUS_TAG: ${{ steps.previous_tag.outputs.previous_tag }}
          PREVIOUS_TAG_URL: ${{ steps.previous_tag.outputs.previous_tag_url }}
          RELEASE_URL: ${{ steps.create_release.outputs.release_url }}
          SUCCESS: ${{ steps.create_release.outputs.success }}
          IS_ANNOTATED: ${{ steps.tag_kind.outputs.is_annotated }}
          ACTOR_LOGIN: ${{ steps.actor_info.outputs.login }}
          ACTOR_URL: ${{ steps.actor_info.outputs.url }}
          ACTOR_EMAIL: ${{ steps.actor_info.outputs.email }}
        run: |
          set -euo pipefail

          export TAG_NAME TAG_URL BRANCH BRANCH_URL COMPONENT PREVIOUS_TAG PREVIOUS_TAG_URL RELEASE_URL SUCCESS IS_ANNOTATED ACTOR_LOGIN ACTOR_URL ACTOR_EMAIL

          python3 - <<'PY' > /tmp/slack-payload.json
          import json, os

          tag_name = os.environ["TAG_NAME"]
          tag_url = os.environ["TAG_URL"]
          branch = os.environ["BRANCH"]
          branch_url = os.environ.get("BRANCH_URL", "")
          previous_tag = os.environ.get("PREVIOUS_TAG", "")
          previous_tag_url = os.environ.get("PREVIOUS_TAG_URL", "")
          release_url = os.environ.get("RELEASE_URL", "")
          success = os.environ.get("SUCCESS", "")
          is_annotated = os.environ.get("IS_ANNOTATED", "")
          actor_login = os.environ.get("ACTOR_LOGIN", "")
          actor_url = os.environ.get("ACTOR_URL", "")
          actor_email = os.environ.get("ACTOR_EMAIL", "")

          parts = tag_name.split("/")
          if len(parts) >= 3 and parts[0] == "release":
              release_key = parts[-2].upper()
              release_version = parts[-1]
              release_label = f"{release_key} {release_version}"
          else:
              release_label = tag_name

          if success == "true":
              draft_state = ":white_check_mark: Draft release created"
          else:
              draft_state = ":warning: Draft release failed"

          if is_annotated != "true":
              draft_state = f"{draft_state} (lightweight tag)"

          fields = [
              {
                  "type": "mrkdwn",
                  "text": f"*Tag:*\n<{tag_url}|`{tag_name}`>"
              },
              {
                  "type": "mrkdwn",
                  "text": f"*Release version:*\n`{release_label}`"
              }
          ]

          if branch and branch != "unknown" and branch_url:
              fields.append({
                  "type": "mrkdwn",
                  "text": f"*Branch:*\n<{branch_url}|`{branch}`>"
              })

          if previous_tag and previous_tag_url:
              fields.append({
                  "type": "mrkdwn",
                  "text": f"*Previous tag:*\n<{previous_tag_url}|`{previous_tag}`>"
              })

          context_text = f"<{actor_url}|@{actor_login}>"
          if actor_email:
              context_text += f" (_`{actor_email}`_)"

          blocks = [
              {
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": f":label: *Tag pushed: {release_label}*"
                  }
              },
              {
                  "type": "section",
                  "fields": fields
              },
              {
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": f"*GitHub draft release:* {draft_state}"
                  }
              },
              {
                  "type": "context",
                  "elements": [
                      {
                          "type": "mrkdwn",
                          "text": f"*Author:* {context_text}"
                      }
                  ]
              }
          ]

          if release_url:
              blocks.append({
                  "type": "actions",
                  "elements": [
                      {
                          "type": "button",
                          "text": {
                              "type": "plain_text",
                              "text": "View Draft Release"
                          },
                          "url": release_url
                      }
                  ]
              })

          print(json.dumps({
              "username": "Release Bot",
              "icon_emoji": ":rocket:",
              "blocks": blocks
          }))
          PY

          {
            echo 'payload<<EOF'
            cat /tmp/slack-payload.json
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack about draft release
        id: slack_draft
        if: always() && steps.create_release.outcome != 'skipped'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: ${{ vars.SLACK_RELEASE_CHANNEL }}
          PAYLOAD: ${{ steps.slack_draft_payload.outputs.payload }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${SLACK_WEBHOOK_URL:-}" ]]; then
            echo "slack_notified=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FINAL_PAYLOAD="$(python3 - <<'PY'
          import json, os
          payload = json.loads(os.environ["PAYLOAD"])
          channel = os.environ.get("SLACK_CHANNEL", "").strip()
          if channel:
              payload["channel"] = channel
          print(json.dumps(payload))
          PY
          )"

          HTTP_CODE="$(curl -s -o /tmp/slack-response.txt -w "%{http_code}" \
            -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$FINAL_PAYLOAD")"

          if [[ "$HTTP_CODE" =~ ^2 ]]; then
            echo "slack_notified=true" >> "$GITHUB_OUTPUT"
          else
            echo "slack_notified=false" >> "$GITHUB_OUTPUT"
            cat /tmp/slack-response.txt
            exit 1
          fi

      - name: Update job summary
        if: always()
        shell: bash
        env:
          TAG_NAME: ${{ steps.tag_info.outputs.tag_name }}
          TAG_URL: ${{ steps.tag_info.outputs.tag_url }}
          COMPONENT: ${{ steps.tag_info.outputs.component }}
          MAJOR_VERSION: ${{ steps.tag_info.outputs.major_version }}
          BRANCH: ${{ steps.tag_info.outputs.branch }}
          BRANCH_URL: ${{ steps.tag_info.outputs.branch_url }}
          IS_ANNOTATED: ${{ steps.tag_kind.outputs.is_annotated }}
          PREVIOUS_TAG: ${{ steps.previous_tag.outputs.previous_tag }}
          PREVIOUS_TAG_URL: ${{ steps.previous_tag.outputs.previous_tag_url }}
          RELEASE_SUCCESS: ${{ steps.create_release.outputs.success }}
          RELEASE_URL: ${{ steps.create_release.outputs.release_url }}
          RELEASE_ERROR: ${{ steps.create_release.outputs.error }}
          SLACK_RESULT: ${{ steps.slack_draft.outputs.slack_notified }}
        run: |
          {
            echo "# Draft Release Summary"
            echo
            echo "## Tag"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Tag | [$TAG_NAME]($TAG_URL) |"
            echo "| Component | \`$COMPONENT\` |"
            echo "| Major | \`$MAJOR_VERSION\` |"
            if [[ "$BRANCH" != "unknown" && -n "$BRANCH_URL" ]]; then
              echo "| Branch | [$BRANCH]($BRANCH_URL) |"
            else
              echo "| Branch | \`$BRANCH\` |"
            fi
            echo "| Annotated | \`$IS_ANNOTATED\` |"
            echo
            echo "## Previous Tag"
            if [[ -n "$PREVIOUS_TAG" && -n "$PREVIOUS_TAG_URL" ]]; then
              echo "- [$PREVIOUS_TAG]($PREVIOUS_TAG_URL)"
            else
              echo "- none found"
            fi
            echo
            echo "## Release"
            if [[ "$RELEASE_SUCCESS" == "true" ]]; then
              echo "- status: created"
              echo "- url: $RELEASE_URL"
            else
              echo "- status: failed"
              if [[ -n "$RELEASE_ERROR" ]]; then
                echo "- error: \`$RELEASE_ERROR\`"
              fi
            fi
            echo
            echo "## Slack"
            echo "- result: \`${SLACK_RESULT:-unknown}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  notify_release_published:
    name: Notify published release
    if: github.event_name == 'release' && github.event.action == 'published' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Extract release information
        id: release_info
        shell: bash
        env:
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
          AUTHOR: ${{ github.event.release.author.login }}
        run: |
          set -euo pipefail

          TAG_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"

          echo "name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "tag_url=$TAG_URL" >> "$GITHUB_OUTPUT"
          echo "url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
          echo "prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"

          if [[ "$RELEASE_TAG" =~ ^release/([^/]+)/ ]]; then
            echo "component=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "component=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release author info
        id: release_author_info
        uses: actions/github-script@v7
        env:
          LOGIN: ${{ steps.release_info.outputs.author }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const login = process.env.LOGIN;
            let email = '';
            let url = `${context.serverUrl}/${login}`;

            try {
              const { data } = await github.rest.users.getByUsername({ username: login });
              url = data.html_url || url;
              email = data.email || '';
            } catch (_) {}

            core.setOutput('login', login);
            core.setOutput('url', url);
            core.setOutput('email', email);

      - name: Build Slack payload for published release
        id: slack_release_payload
        shell: bash
        env:
          RELEASE_NAME: ${{ steps.release_info.outputs.name }}
          RELEASE_TAG: ${{ steps.release_info.outputs.tag }}
          TAG_URL: ${{ steps.release_info.outputs.tag_url }}
          RELEASE_URL: ${{ steps.release_info.outputs.url }}
          COMPONENT: ${{ steps.release_info.outputs.component }}
          IS_PRERELEASE: ${{ steps.release_info.outputs.prerelease }}
          AUTHOR_LOGIN: ${{ steps.release_author_info.outputs.login }}
          AUTHOR_URL: ${{ steps.release_author_info.outputs.url }}
          AUTHOR_EMAIL: ${{ steps.release_author_info.outputs.email }}
        run: |
          set -euo pipefail

          export RELEASE_NAME RELEASE_TAG TAG_URL RELEASE_URL COMPONENT IS_PRERELEASE AUTHOR_LOGIN AUTHOR_URL AUTHOR_EMAIL

          python3 - <<'PY' > /tmp/slack-payload.json
          import json, os

          release_name = os.environ["RELEASE_NAME"]
          release_tag = os.environ["RELEASE_TAG"]
          tag_url = os.environ["TAG_URL"]
          release_url = os.environ["RELEASE_URL"]
          component = os.environ["COMPONENT"]
          is_prerelease = os.environ["IS_PRERELEASE"]
          author_login = os.environ["AUTHOR_LOGIN"]
          author_url = os.environ["AUTHOR_URL"]
          author_email = os.environ.get("AUTHOR_EMAIL", "")

          icon = ":package:" if is_prerelease == "true" else ":rocket:"
          kind = "Pre-release" if is_prerelease == "true" else "Release"

          context_text = f"<{author_url}|@{author_login}>"
          if author_email:
              context_text += f" (_`{author_email}`_)"

          blocks = [
              {
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": f"{icon} *{kind} published*"
                  }
              },
              {
                  "type": "section",
                  "fields": [
                      {
                          "type": "mrkdwn",
                          "text": f"*Name:*\n{release_name}"
                      },
                      {
                          "type": "mrkdwn",
                          "text": f"*Tag:*\n<{tag_url}|`{release_tag}`>"
                      },
                      {
                          "type": "mrkdwn",
                          "text": f"*Component:*\n`{component.upper()}`"
                      },
                      {
                          "type": "mrkdwn",
                          "text": f"*Release page:*\n<{release_url}|Open release>"
                      }
                  ]
              },
              {
                  "type": "context",
                  "elements": [
                      {
                          "type": "mrkdwn",
                          "text": f"*Author:* {context_text}"
                      }
                  ]
              },
              {
                  "type": "actions",
                  "elements": [
                      {
                          "type": "button",
                          "text": {
                              "type": "plain_text",
                              "text": "View Release"
                          },
                          "url": release_url,
                          "style": "primary"
                      }
                  ]
              }
          ]

          print(json.dumps({
              "username": "Release Bot",
              "icon_emoji": ":rocket:",
              "blocks": blocks
          }))
          PY

          {
            echo 'payload<<EOF'
            cat /tmp/slack-payload.json
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack about published release
        id: slack_release
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: ${{ vars.SLACK_RELEASE_CHANNEL }}
          PAYLOAD: ${{ steps.slack_release_payload.outputs.payload }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${SLACK_WEBHOOK_URL:-}" ]]; then
            echo "slack_notified=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FINAL_PAYLOAD="$(python3 - <<'PY'
          import json, os
          payload = json.loads(os.environ["PAYLOAD"])
          channel = os.environ.get("SLACK_CHANNEL", "").strip()
          if channel:
              payload["channel"] = channel
          print(json.dumps(payload))
          PY
          )"

          HTTP_CODE="$(curl -s -o /tmp/slack-response.txt -w "%{http_code}" \
            -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$FINAL_PAYLOAD")"

          if [[ "$HTTP_CODE" =~ ^2 ]]; then
            echo "slack_notified=true" >> "$GITHUB_OUTPUT"
          else
            echo "slack_notified=false" >> "$GITHUB_OUTPUT"
            cat /tmp/slack-response.txt
            exit 1
          fi

      - name: Update job summary
        if: always()
        shell: bash
        env:
          RELEASE_NAME: ${{ steps.release_info.outputs.name }}
          RELEASE_TAG: ${{ steps.release_info.outputs.tag }}
          TAG_URL: ${{ steps.release_info.outputs.tag_url }}
          COMPONENT: ${{ steps.release_info.outputs.component }}
          IS_PRERELEASE: ${{ steps.release_info.outputs.prerelease }}
          AUTHOR: ${{ steps.release_info.outputs.author }}
          RELEASE_URL: ${{ steps.release_info.outputs.url }}
          SLACK_RESULT: ${{ steps.slack_release.outputs.slack_notified }}
        run: |
          {
            echo "# Published Release Notification"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Name | $RELEASE_NAME |"
            echo "| Tag | [$RELEASE_TAG]($TAG_URL) |"
            echo "| Component | \`$COMPONENT\` |"
            echo "| Type | \`$IS_PRERELEASE\` |"
            echo "| Author | @$AUTHOR |"
            echo
            echo "- url: $RELEASE_URL"
            echo "- slack: \`${SLACK_RESULT:-unknown}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  monitor_release_branches:
    name: Monitor release branch activity
    if: |
      github.event_name == 'create' ||
      (github.event_name == 'push' &&
       startsWith(github.ref, 'refs/heads/release/'))
    runs-on: ubuntu-latest
    steps:
      - name: Detect event
        id: detect_event
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "create" ]]; then
            if [[ "${{ github.event.ref_type }}" != "branch" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [[ "${{ github.event.ref }}" != release/* ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            BRANCH="${{ github.event.ref }}"
            BRANCH_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/tree/${BRANCH}"

            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "event_type=branch_created" >> "$GITHUB_OUTPUT"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
            echo "branch_url=$BRANCH_URL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="${GITHUB_REF#refs/heads/}"
          BRANCH_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/tree/${BRANCH}"

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "branch_url=$BRANCH_URL" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event.forced }}" == "true" ]]; then
            echo "event_type=force_push" >> "$GITHUB_OUTPUT"
          else
            echo "event_type=push" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.detect_event.outputs.skip != 'true' && github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Resolve actor info
        id: actor_info
        if: steps.detect_event.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          LOGIN: ${{ github.actor }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const login = process.env.LOGIN;
            let email = '';
            let url = `${context.serverUrl}/${login}`;

            try {
              const { data } = await github.rest.users.getByUsername({ username: login });
              url = data.html_url || url;
              email = data.email || '';
            } catch (_) {}

            core.setOutput('login', login);
            core.setOutput('url', url);
            core.setOutput('email', email);

      - name: Collect push details
        id: push_details
        if: steps.detect_event.outputs.skip != 'true' && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commits = context.payload.commits || [];
            const maxCommits = 10;
            const selected = commits.slice(0, maxCommits);

            function firstLine(s) {
              return (s || '').split('\n')[0].trim();
            }

            function userLink(login) {
              return `<${context.serverUrl}/${login}|@${login}>`;
            }

            const lines = [];
            for (const c of selected) {
              const sha = c.id;
              const shortSha = sha.slice(0, 8);
              const subject = firstLine(c.message) || shortSha;
              const commitUrl = c.url?.replace('api.github.com/repos', 'github.com').replace('/commits/', '/commit/') || `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${sha}`;

              let line = `• <${commitUrl}|${subject}> (\`${shortSha}\`)`;

              try {
                const prResp = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  commit_sha: sha
                });

                const prs = (prResp.data || []).filter(pr => pr);
                const mergedPr = prs.find(pr => pr.merged_at) || prs[0];

                if (mergedPr) {
                  const prUrl = mergedPr.html_url;
                  line += ` · PR <${prUrl}|#${mergedPr.number}>`;

                  const reviews = await github.paginate(github.rest.pulls.listReviews, {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: mergedPr.number,
                    per_page: 100
                  });

                  const reviewers = [];
                  const seen = new Set();
                  for (const review of reviews) {
                    const login = review.user?.login;
                    if (!login || seen.has(login)) continue;
                    seen.add(login);
                    reviewers.push(userLink(login));
                  }

                  if (reviewers.length > 0) {
                    line += `\n  reviewers: ${reviewers.join(', ')}`;
                  }
                }
              } catch (_) {
              }

              lines.push(line);
            }

            core.setOutput('commit_count', String(commits.length));
            core.setOutput('commit_lines', lines.join('\n'));

      - name: Build Slack payload for branch activity
        id: slack_branch_payload
        if: steps.detect_event.outputs.skip != 'true'
        shell: bash
        env:
          EVENT_TYPE: ${{ steps.detect_event.outputs.event_type }}
          BRANCH: ${{ steps.detect_event.outputs.branch }}
          BRANCH_URL: ${{ steps.detect_event.outputs.branch_url }}
          ACTOR_LOGIN: ${{ steps.actor_info.outputs.login }}
          ACTOR_URL: ${{ steps.actor_info.outputs.url }}
          ACTOR_EMAIL: ${{ steps.actor_info.outputs.email }}
          COMMIT_LINES: ${{ steps.push_details.outputs.commit_lines }}
          COMMIT_COUNT: ${{ steps.push_details.outputs.commit_count }}
        run: |
          set -euo pipefail

          export EVENT_TYPE BRANCH BRANCH_URL ACTOR_LOGIN ACTOR_URL ACTOR_EMAIL COMMIT_LINES COMMIT_COUNT

          python3 - <<'PY' > /tmp/slack-payload.json
          import json, os

          event_type = os.environ["EVENT_TYPE"]
          branch = os.environ["BRANCH"]
          branch_url = os.environ["BRANCH_URL"]
          actor_login = os.environ["ACTOR_LOGIN"]
          actor_url = os.environ["ACTOR_URL"]
          actor_email = os.environ.get("ACTOR_EMAIL", "")
          commit_lines = os.environ.get("COMMIT_LINES", "").strip()
          commit_count = os.environ.get("COMMIT_COUNT", "").strip()

          parts = branch.split("/")
          if len(parts) >= 3 and parts[0] == "release":
              release_key = parts[-2].upper()
              release_version = parts[-1]
              release_label = f"{release_key} {release_version}"
          else:
              release_label = branch

          if event_type == "branch_created":
              icon = ":seedling:"
              title = f"Release branch created: {release_label}"
          elif event_type == "force_push":
              icon = ":warning:"
              title = f"Force push to release branch: {release_label}"
          else:
              icon = ":pushpin:"
              title = f"Push to release branch: {release_label}"

          context_text = f"<{actor_url}|@{actor_login}>"
          if actor_email:
              context_text += f" (_`{actor_email}`_)"

          blocks = [
              {
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": f"{icon} *{title}*"
                  }
              },
              {
                  "type": "section",
                  "fields": [
                      {
                          "type": "mrkdwn",
                          "text": f"*Branch:*\n<{branch_url}|`{branch}`>"
                      },
                      {
                          "type": "mrkdwn",
                          "text": f"*Release:*\n`{release_label}`"
                      }
                  ]
              },
              {
                  "type": "context",
                  "elements": [
                      {
                          "type": "mrkdwn",
                          "text": f"*Author:* {context_text}"
                      }
                  ]
              }
          ]

          if commit_lines:
              count_suffix = f" ({commit_count})" if commit_count else ""
              blocks.append({
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": f"*Commits pushed{count_suffix}*\n{commit_lines}"
                  }
              })

          print(json.dumps({
              "username": "Release Bot",
              "icon_emoji": ":branch:",
              "blocks": blocks
          }))
          PY

          {
            echo 'payload<<EOF'
            cat /tmp/slack-payload.json
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack about branch activity
        id: slack_branch
        if: steps.detect_event.outputs.skip != 'true'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: ${{ vars.SLACK_RELEASE_CHANNEL }}
          PAYLOAD: ${{ steps.slack_branch_payload.outputs.payload }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${SLACK_WEBHOOK_URL:-}" ]]; then
            echo "slack_notified=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FINAL_PAYLOAD="$(python3 - <<'PY'
          import json, os
          payload = json.loads(os.environ["PAYLOAD"])
          channel = os.environ.get("SLACK_CHANNEL", "").strip()
          if channel:
              payload["channel"] = channel
          print(json.dumps(payload))
          PY
          )"

          HTTP_CODE="$(curl -s -o /tmp/slack-response.txt -w "%{http_code}" \
            -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$FINAL_PAYLOAD")"

          if [[ "$HTTP_CODE" =~ ^2 ]]; then
            echo "slack_notified=true" >> "$GITHUB_OUTPUT"
          else
            echo "slack_notified=false" >> "$GITHUB_OUTPUT"
            cat /tmp/slack-response.txt
            exit 1
          fi

      - name: Update job summary
        if: always() && steps.detect_event.outputs.skip != 'true'
        shell: bash
        env:
          EVENT_TYPE: ${{ steps.detect_event.outputs.event_type }}
          BRANCH: ${{ steps.detect_event.outputs.branch }}
          BRANCH_URL: ${{ steps.detect_event.outputs.branch_url }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          COMMIT_LINES: ${{ steps.push_details.outputs.commit_lines }}
          SLACK_RESULT: ${{ steps.slack_branch.outputs.slack_notified }}
        run: |
          {
            echo "# Release Branch Activity"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Event | \`$EVENT_TYPE\` |"
            echo "| Branch | [$BRANCH]($BRANCH_URL) |"
            echo "| Actor | @$ACTOR |"
            if [[ "$EVENT_TYPE" != "branch_created" ]]; then
              echo "| Commit | [\`${COMMIT_SHA:0:8}\`]($COMMIT_URL) |"
            fi
            echo
            if [[ -n "$COMMIT_LINES" ]]; then
              echo "## Commits"
              echo "$COMMIT_LINES"
              echo
            fi
            echo "- slack: \`${SLACK_RESULT:-unknown}\`"
          } >> "$GITHUB_STEP_SUMMARY"
