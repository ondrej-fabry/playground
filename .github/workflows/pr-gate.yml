name: PR Platform Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  decide:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        shell: bash
        run: |
          title='${{ github.event.pull_request.title }}'

          jq -cn --arg title "$title" '
            {
              include:
                (
                  [
                    (if $title | contains("[gen1]")    then {platform:"gen1"}    else empty end),
                    (if $title | contains("[nextgen]") then {platform:"nextgen"} else empty end),
                    (if $title | contains("[arm]")     then {platform:"arm"}     else empty end)
                  ]
                  | if length == 0 then [{platform:"gen1"}] else . end
                )
            }
          ' | tee /tmp/matrix.json

          echo "matrix=$(cat /tmp/matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: decide
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.decide.outputs.matrix) }}
    name: build / ${{ matrix.platform }}

    permissions:
      contents: read
      statuses: write

    steps:
      - uses: actions/checkout@v4

      - name: Main platform work
        run: |
          echo "platform=${{ matrix.platform }}"
          sleep 3

      - name: Mark nextgen async as pending
        if: matrix.platform == 'nextgen'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            -X POST \
            repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state='pending' \
            -f context='nextgen-async' \
            -f description='Nextgen async workflow queued' \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Dispatch async nextgen workflow
        if: matrix.platform == 'nextgen'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}
        run: |
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/actions/workflows/nextgen-async.yml/dispatches \
            -f ref="${{ github.event.pull_request.head.ref }}" \
            -f inputs[pr_number]="${{ github.event.pull_request.number }}" \
            -f inputs[head_sha]="${{ github.event.pull_request.head.sha }}" \
            -f inputs[platform]="${{ matrix.platform }}"
