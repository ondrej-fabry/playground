name: PR Platform Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [gen1, nextgen, legacy]

    name: build / ${{ matrix.platform }}

    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Main platform work
        run: |
          echo "platform=${{ matrix.platform }}"
          sleep 3

      - name: Dispatch async nextgen workflow
        if: matrix.platform == 'nextgen'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            /repos/$REPO/actions/workflows/nextgen-async.yml/dispatches \
            -f ref="$REF" \
            -f inputs[pr_number]="$PR_NUMBER" \
            -f inputs[head_sha]="$HEAD_SHA" \
            -f inputs[platform]="nextgen"

      - name: Note async dispatch
        if: matrix.platform == 'nextgen'
        run: echo "Triggered async nextgen workflow."