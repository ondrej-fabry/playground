name: PR Matrix From Title

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  decide:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        shell: bash
        run: |
          title='${{ github.event.pull_request.title }}'

          platforms=()

          [[ "$title" == *"[gen1]"*    ]] && platforms+=('"gen1"')
          [[ "$title" == *"[nextgen]"* ]] && platforms+=('"nextgen"')
          [[ "$title" == *"[arm]"*     ]] && platforms+=('"arm"')

          # default when title has no markers
          if [ ${#platforms[@]} -eq 0 ]; then
            platforms+=('"gen1"')
          fi

          matrix_json=$(printf '{"include":[%s]}\n' \
            "$(IFS=,; for p in "${platforms[@]}"; do
                printf '{"platform":%s},' "$p"
              done | sed 's/,$//')")

          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"
          echo "$matrix_json"

  build:
    needs: decide
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.decide.outputs.matrix) }}
    name: build / ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Main
        run: echo "platform=${{ matrix.platform }}"

      - name: Extra nextgen step
        if: matrix.platform == 'nextgen'
        run: echo "nextgen-only extra step"