name: PR Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  pr-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: decide
        shell: bash
        run: |
          title='${{ github.event.pull_request.title }}'

          if [[ "$title" == *"[heavy]"* ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=PR title contains [heavy]" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=PR title does not contain [heavy]" >> "$GITHUB_OUTPUT"
          fi

      - name: Decision
        run: |
          echo "should_run=${{ steps.decide.outputs.should_run }}"
          echo "reason=${{ steps.decide.outputs.reason }}"

      - name: Heavy
        if: steps.decide.outputs.should_run == 'true'
        run: |
          echo "running heavy path"
          sleep 3

      - name: Skip note
        if: steps.decide.outputs.should_run != 'true'
        run: |
          echo "skipping heavy path"