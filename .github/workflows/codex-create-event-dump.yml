name: Codex create-event dump

run-name: "${{ github.event_name == 'create' && 'Created' || 'Deleted' }} ${{ github.event.ref_type }}: ${{ github.event.ref }}"

on:
  create:
  delete:

permissions: {}

jobs:
  dump-event:
    runs-on: ubuntu-latest
    steps:
      - name: Print event payload
        run: jq . "$GITHUB_EVENT_PATH"
